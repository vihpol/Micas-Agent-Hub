services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_CREWAI: ${INSTALL_CREWAI:-false}
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CREWAI_LLM_MODEL: ${CREWAI_LLM_MODEL:-ollama_chat/tinyllama}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}
      USE_REAL_AGENTS: ${USE_REAL_AGENTS:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.1.48}
    profiles:
      - agents
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.1.48}
    profiles:
      - agents
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-tinyllama}
    entrypoint: ["sh", "-c", "ollama pull \"$$OLLAMA_MODEL\""]
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama-data:
